services:
  mysql:
    image: mysql:8.4
    container_name: phishing-detector-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: phishing_detector
      MYSQL_USER: phishing_user
      MYSQL_PASSWORD: phishing_pass
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phishing-detector-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      APP_DEBUG: "false"
      APP_MYSQL_HOST: mysql
      APP_SQLALCHEMY_DATABASE_URL: mysql+pymysql://phishing_user:phishing_pass@mysql:3306/phishing_detector
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    container_name: phishing-detector-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
